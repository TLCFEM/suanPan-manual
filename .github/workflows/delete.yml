jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - name: Delete All
        uses: strumwolf/delete-deployment-environment@v4
        with:
          environment: github-pages
          token: ${{ secrets.ALL }}
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Delete Package
        uses: Chizkiyahu/delete-untagged-ghcr-action@v6
        with:
          owner_type: user
          package_name: suanpan-manual
          token: ${{ secrets.ALL }}
          untagged_only: true
name: Delete
'on':
  workflow_call: null
  workflow_dispatch: null
