concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}
env:
  SP_VERSION: "4.2"
jobs:
  delete:
    needs:
      - deploy
      - docker
    secrets: inherit
    uses: ./.github/workflows/delete.yml
  deploy:
    if: ${{ !contains(github.event.head_commit.message, 'Bump') }}
    runs-on: ubuntu-latest
    steps:
      - name: Clone
        uses: actions/checkout@v7
      - name: Setup
        uses: actions/setup-python@v6
        with:
          cache: pip
          python-version: "3.12"
      - name: Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Dependency
        run: |
          sudo apt-get install doxygen graphviz pngquant
          pip install -e .
          npm install -g svgo
          find $(pwd)/suanPan* -type f -path "*/bin/updater" -exec rm -f {} +
          sudo ln -s $(find $(pwd)/suanPan* -type f -name suanPan.sh | head -n1) /usr/bin/suanpan
          suanpan -v
      - if: ${{ github.event_name != 'push' }}
        name: Deploy
        run: |
          mkdocs build
          svgo -rf site -o site
      - if: ${{ github.event_name == 'push' }}
        name: Publish
        run: |
          git fetch origin
          git config --global user.name "Theodore Chang"
          git config --global user.email "tlcfem@gmail.com"
          git pull
          mike deploy ${{ env.SP_VERSION }}
          git clean -fd && git reset --hard && git checkout gh-pages
          svgo -rf ${{ env.SP_VERSION }} --exclude inherit_graph.* -o ${{ env.SP_VERSION }}
          git add -A
          git commit --amend --no-edit
          git push origin gh-pages
  docker:
    if: ${{ github.event_name == 'push' }}
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: Clone
        uses: actions/checkout@v7
      - name: Login
        uses: docker/login-action@v4
        with:
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
      - name: Login GitHub
        uses: docker/login-action@v4
        with:
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
          username: ${{ github.actor }}
      - name: Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            tlcfem/suanpan-manual:latest
            ghcr.io/tlcfem/suanpan-manual:latest
            tlcfem/suanpan-manual:${{ env.SP_VERSION }}
            ghcr.io/tlcfem/suanpan-manual:${{ env.SP_VERSION }}
    timeout-minutes: 100
name: Latest
"on":
  pull_request:
    branches:
      - dev
  push:
    branches:
      - dev
permissions:
  contents: write
