name: latest
on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev
permissions:
  contents: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, 'Bump') }}
    steps:
      - name: Clone
        uses: actions/checkout@v6
      - name: Setup
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Dependency
        run: |
          sudo apt-get install doxygen graphviz pngquant
          pip install -e .
          find $(pwd)/suanPan* -type f -path "*/bin/updater" -exec rm -f {} +
          sudo ln -s $(find $(pwd)/suanPan* -type f -name suanPan.sh | head -n1) /usr/bin/suanpan
          suanpan -v
      - name: Deploy
        if: ${{ github.event_name != 'push' }}
        run: |
          mkdocs build
      - name: Publish
        if: ${{ github.event_name == 'push' }}
        run: |
          git fetch origin
          git config --global user.name "Theodore Chang"
          git config --global user.email "tlcfem@gmail.com"
          git pull
          mike deploy 4.1
          git push origin gh-pages
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 100
    permissions:
      contents: read
      packages: write
    steps:
      - name: Clone
        uses: actions/checkout@v6
      - name: Login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login GitHub
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            tlcfem/suanpan-manual:latest
            ghcr.io/tlcfem/suanpan-manual:latest
